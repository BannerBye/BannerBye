name: Phase 2B — analyze reported sites

# Headless analyse van gemelde "broken sites" + draft-PR met keyword-voorstellen.
# Draait dagelijks en handmatig. Opent NOOIT een auto-merge — alleen een draft-PR.

on:
  schedule:
    - cron: "0 6 * * *" # elke dag 06:00 UTC
  workflow_dispatch:
    inputs:
      max_hosts:
        description: "Max aantal hosts deze run"
        required: false
        default: "25"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: phase2b-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install analyzer deps
        working-directory: scripts/phase2b
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: scripts/phase2b
        run: npx playwright install --with-deps chromium

      - name: Run analyzer
        id: analyze
        working-directory: scripts/phase2b
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          MAX_HOSTS: ${{ github.event.inputs.max_hosts || '25' }}
        run: node --experimental-strip-types analyze.ts

      - name: Open draft PR with keyword proposals
        if: steps.analyze.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: phase2b/keyword-proposals
          base: main
          draft: true
          add-paths: rules.json
          commit-message: "Phase 2B: voorgestelde reject-keywords uit site-analyse"
          title: "Phase 2B — voorgestelde reject-keywords"
          body: ${{ steps.analyze.outputs.summary }}
          labels: phase-2b, automated
