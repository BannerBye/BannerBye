name: Phase 2B/2C — analyze reported sites

# Headless analyse van gemelde "broken sites" → Claude beoordeelt voorgestelde
# keywords. Approve+high gaat AUTOMATISCH live (commit naar landing-repo →
# Vercel auto-deploy). Randgevallen → draft-PR (het vangnet). Nooit auto-merge
# van de review-PR.

# Draait NIET meer op een dagschema. In plaats daarvan meteen wanneer een
# gebruiker een link inzendt: deploy/api/report.ts vuurt na een geldige melding
# een repository_dispatch (type "report-submitted") af. Weinig inzendingen →
# behapbaar. workflow_dispatch blijft voor handmatige (her)runs.
on:
  repository_dispatch:
    types: [report-submitted]
  workflow_dispatch:
    inputs:
      max_hosts:
        description: "Max aantal hosts deze run"
        required: false
        default: "25"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: phase2b-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout extensie-repo (analyzer + keyword-logica)
        uses: actions/checkout@v5

      - name: Checkout landing-repo (bannerbye.com bron)
        uses: actions/checkout@v5
        with:
          repository: BannerBye/bannerbye-landing
          token: ${{ secrets.LANDING_REPO_TOKEN }}
          path: landing

      # setup-node@v5 wil via package-manager-cache Corepack/pnpm activeren (root
      # packageManager-veld pnpm@9.12.0) en crasht omdat pnpm niet op de runner
      # staat. De analyzer gebruikt alleen npm → cache uit, dan draait v5 (node24)
      # schoon en verdwijnt de node20-deprecation-warning.
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install analyzer deps
        working-directory: scripts/phase2b
        run: npm install --no-audit --no-fund

      # De GitHub-runner heeft af en toe een kapotte Microsoft/Azure apt-repo
      # ("InRelease no longer signed / NOSPLIT") waardoor `--with-deps` (die
      # apt-get draait) faalt. Playwright heeft die repo's niet nodig. We
      # verwijderen ELK bronbestand dat naar packages.microsoft.com verwijst
      # (zowel oude .list- als nieuwe .sources-bestanden), en als apt dan nog
      # struikelt valt de install terug op alleen de browser-binary.
      - name: Install Playwright Chromium
        working-directory: scripts/phase2b
        run: |
          grep -rlZ 'packages.microsoft.com' /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null \
            | xargs -0 -r sudo rm -f || true
          npx playwright install --with-deps chromium || npx playwright install chromium

      - name: Run analyzer (analyse + Claude-judge + auto-apply)
        id: analyze
        working-directory: scripts/phase2b
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Opt-in "email me when fixed" (#reward-3). Ontbreekt de secret, dan is
          # notify een stille no-op — de rest van de run draait gewoon door.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAX_HOSTS: ${{ github.event.inputs.max_hosts || '25' }}
          RULES_FILE: ${{ github.workspace }}/landing/rules.json
        run: node --experimental-strip-types analyze.ts

      # Approve+high → meteen live via de Git-gekoppelde landing-repo.
      - name: Auto-apply approved keywords (→ Vercel auto-deploy)
        if: steps.analyze.outputs.applied == 'true'
        working-directory: landing
        env:
          COMMIT_MESSAGE: ${{ steps.analyze.outputs.commit_message }}
        run: |
          git config user.name "bannerbye-bot"
          git config user.email "hello@bannerbye.com"
          git add rules.json
          git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:main

      # Randgevallen: zet ze in rules.json op een branch + open draft-PR.
      - name: Stage needs-review keywords
        if: steps.analyze.outputs.needs_review == 'true'
        working-directory: scripts/phase2b
        env:
          RULES_FILE: ${{ github.workspace }}/landing/rules.json
        run: node --experimental-strip-types apply-needs-review.ts

      - name: Draft-PR voor needs-review keywords
        if: steps.analyze.outputs.needs_review == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          path: landing
          token: ${{ secrets.LANDING_REPO_TOKEN }}
          branch: phase2c/keyword-review
          base: main
          draft: true
          add-paths: rules.json
          commit-message: "Phase 2C: keywords naar review"
          title: "Phase 2C — keywords naar review"
          body: ${{ steps.analyze.outputs.pr_body }}
          labels: phase-2c, automated, needs-review
